  #   restart: always

  jardinconecta-api:
    image: ghcr.io/galbornozdev/jardinconecta-api:latest
    #build:
      # context: ./JardinConecta
      # dockerfile: Dockerfile
    container_name: jardinconecta-api
    depends_on:
      - postgres
      - elasticsearch
    environment:
      # proxy + ssl
      VIRTUAL_HOST: ${VIRTUAL_HOST}
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST}
      VIRTUAL_PORT: ${API_PORT}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Application__BaseUrl: "${APPLICATION_BASE_URL}"
      LogLevel__Default: "Warning"
      ConnectionStrings__Default: "Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      SendGrid__ApiKey: ${SENDGRID_API_KEY}
      SendGrid__FromEmail: ${SENDGRID_FROM_EMAIL}
      Twilio__AccountSid: ${TWILIO_ACCOUNT_SID}
      Twilio__AuthToken: ${TWILIO_AUTH_TOKEN}
      Twilio__FromPhone: ${TWILIO_FROM_PHONE}
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID}
      Firebase__PrivateKeyId: ${FIREBASE_PRIVATE_KEY_ID}
      Firebase__PrivateKey: ${FIREBASE_PRIVATE_KEY}
      Firebase__ClientEmail: ${FIREBASE_CLIENT_EMAIL}
      Firebase__ClientId: ${FIREBASE_CLIENT_ID}
      Jwt__Key: ${JWT_KEY}
      Elasticsearch__Url: "http://elasticsearch:9200"
    ports:
      - "${API_PORT}:8080"
    volumes:
      - media_data:/app/media
    expose:
      - "8080"
    networks:
      - proxy
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: jardinconecta-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - proxy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: jardinconecta-kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - proxy
    restart: always

  postgres:
    image: postgres:16
    container_name: jardinconecta-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy:
    external: true

volumes:
  postgres_data:
  media_data:
  elasticsearch_data:
  # certs:
  # vhost:
  # html: