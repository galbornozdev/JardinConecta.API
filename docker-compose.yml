  #   restart: always

  jardinconecta-api:
    image: ghcr.io/galbornozdev/jardinconecta-api:latest
    #build:
      # context: ./JardinConecta
      # dockerfile: Dockerfile
    container_name: jardinconecta-api
    depends_on:
      - postgres
      - loki
    environment:
      # proxy + ssl
      VIRTUAL_HOST: ${VIRTUAL_HOST}
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST}
      VIRTUAL_PORT: ${API_PORT}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Application__BaseUrl: "${APPLICATION_BASE_URL}"
      LogLevel__Default: "Warning"
      ConnectionStrings__Default: "Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      SendGrid__ApiKey: ${SENDGRID_API_KEY}
      SendGrid__FromEmail: ${SENDGRID_FROM_EMAIL}
      Twilio__AccountSid: ${TWILIO_ACCOUNT_SID}
      Twilio__AuthToken: ${TWILIO_AUTH_TOKEN}
      Twilio__FromPhone: ${TWILIO_FROM_PHONE}
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID}
      Firebase__PrivateKeyId: ${FIREBASE_PRIVATE_KEY_ID}
      Firebase__PrivateKey: ${FIREBASE_PRIVATE_KEY}
      Firebase__ClientEmail: ${FIREBASE_CLIENT_EMAIL}
      Firebase__ClientId: ${FIREBASE_CLIENT_ID}
      Jwt__Key: ${JWT_KEY}
      Loki__Url: "http://loki:3100"
    ports:
      - "${API_PORT}:8080"
    volumes:
      - media_data:/app/media
    expose:
      - "8080"
    networks:
      - proxy
    restart: always

  loki:
    image: grafana/loki:3.4.0
    container_name: jardinconecta-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - proxy
    restart: always

  grafana:
    image: grafana/grafana:11.0.0
    container_name: jardinconecta-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - proxy
    restart: always

  postgres:
    image: postgres:16
    container_name: jardinconecta-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy:
    external: true

volumes:
  postgres_data:
  media_data:
  loki_data:
  grafana_data:
  # certs:
  # vhost:
  # html: